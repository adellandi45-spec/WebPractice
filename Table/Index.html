<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
 <h1>Table</h1>  
 <table>
    <caption>
        weekly class schedule
    </caption>
    <!--this is a coment-->
    <thead>
      <tr>
        <th scope="col">Day</th>
        <th scope="col">Subject</th>
        <th scope="col">Time</th>
      </tr> 
    </thead>
    <!--this is a coment-->
    <tbody>
      <tr>
        <th scope="row">Monday</th>
        <td>HTML Basics</td>
        <td>10:00 AM</td>
      </tr>
      <tr>
        <th scope="row">Wednesday</th>
        <td>CSS Fundamentals</td>
        <td>10:00 AM</td>
      </tr>
      <tr>
        <th scope="row">Friday</th>
        <td>Project Review</td>
        <td>2:00 PM</td>
      </tr>
    </tbody>
    <!--this is a coment-->
    <tfoot>
      <tr>
        <td colspan="3">3 months session</td>
      </tr>
    </tfoot>
    <!---this is a coment-->
 </table> 
</body>
</html>
