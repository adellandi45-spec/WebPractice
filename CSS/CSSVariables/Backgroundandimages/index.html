<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images and Backgrounds</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    <h1>Backgrounds and Imagee</h1>

<div class="hero  hero-gradient">
    <h2>Hero with a css gradient background</h2>
    <p>No image file needed the background is pure css</p>
</div>

    <div class="hero hero--image">
        <div class="hero-overlay">
        <h2>Hero with an Image + dark overlay</h2>
        <p>Text stay redable because of a semi-trnsperent layer between the image and the text</p>
         
    </div>
</div>
<h2>Object-fit Comparison</h2>
<div class="row">
    <figure class="image-demo">
        <img src="../../../del.jpg" alt="A placeholder square image stretch to fit a wide box" class="fif-fill" width="200px">
        <figcaption>Object-file: (stretches, can distort)</figcaption>       
    </figure>
    <figure image-demo>
         <img src="../../../del.jpg" alt="A placeholder square image stretch to fit a wide box" class="fif-fill" width="200px">
        <figcaption>Object-fit: cover (crops, no distortion)</figcaption>       
    </figure>
</div>
</body>
</html>
