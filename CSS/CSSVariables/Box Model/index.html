<body>
    <h1>The box model</h1>

    <div class="box content-box">
     <p>box-sizing: content-box (default), width is 200px only, -- padding and border are added on top</p>
    </div>
    <div class="box border-box">
<p>box-sizing: border-box. width is 200 total --padding and border are included inside the 200px</p>
    </div>
    <div class="parent">
     <div class="chiled">
       I have a margin around me. padding insideme, and a border between the two
     </div>
    </div>
</body>
